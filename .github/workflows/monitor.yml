name: Festool Recon Monitor

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). NOTE: schedules are best-effort and
    # GitHub often throttles/skips 5-min crons under load, so real spacing is
    # frequently 5-15 min. This is the floor; you can't go faster on Actions.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button in the Actions tab

permissions:
  contents: write          # needed to commit state.json + docs/catalog.json back

concurrency:
  group: festool-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run monitor
        env:
          # --- ntfy (recommended: open-source, NO account/password/token) ---
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}    # required for ntfy
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}   # optional (default https://ntfy.sh)
          NTFY_TOKEN:  ${{ secrets.NTFY_TOKEN }}    # optional (only for protected topics)
          # --- email/SMTP (optional alternative or in addition) ---
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
        run: python3 festool_monitor.py

      - name: Commit updated state + catalog
        if: always()
        run: |
          if [[ -n "$(git status --porcelain state.json docs/catalog.json)" ]]; then
            git config user.name  "festool-monitor[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json docs/catalog.json
            git commit -m "chore: update sale state + catalog [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
